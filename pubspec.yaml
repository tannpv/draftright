name: draftright_mobile
description: AI-powered text rewriting keyboard toolbar
publish_to: 'none'
version: 2.1.7+14

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.0.0
  http: ^1.1.0
  path_provider: ^2.1.0
  provider: ^6.0.0
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^7.1.1
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.0
  system_tray: ^2.0.0
  hotkey_manager: ^0.2.0
  window_manager: ^0.3.0
  screen_retriever: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#1A40F2"
  adaptive_icon_foreground: "assets/icon_foreground.png"

flutter:
  uses-material-design: true
