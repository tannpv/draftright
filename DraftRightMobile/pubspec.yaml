name: draftright_mobile
description: AI-powered text rewriting keyboard toolbar
publish_to: 'none'
version: 2.4.5+66

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.0.0
  http: ^1.1.0
  # Transitive via http, declared explicitly so bug_report_service
  # can set MediaType('image', 'jpeg') on screenshot uploads
  # (analyser flags the unreferenced dep otherwise).
  http_parser: ^4.0.0
  crypto: ^3.0.0  # SHA-256 verify for downloaded IME packs
  path_provider: ^2.1.0
  provider: ^6.0.0
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^7.1.1
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.0
  system_tray: ^2.0.0
  hotkey_manager: ^0.2.0
  window_manager: ^0.3.0
  screen_retriever: ^0.1.0
  image_picker: ^1.2.2
  # Pure-Dart image decode/resize/encode — downscales picked screenshots
  # before upload so the multipart body stays well under the backend's 5 MB
  # cap (a near-5 MB image otherwise 413s: the client guards the image file
  # size, the server guards the whole body). Pure Dart → runs in flutter test
  # and needs no pod/gradle native step. See screenshot_compressor.dart.
  image: ^4.3.0
  # Universal Link / App Link listener used by the payment-return
  # flow (LS hosted-checkout redirects to https://draftright.info/
  # payment/success?ref=...).  Stream-based API; mirrors share_service.
  app_links: ^6.3.0
  sign_in_with_apple: ^8.1.0
  flutter_stripe: ^12.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.0

dependency_overrides:
  # path_provider_foundation 2.5.0/2.6.0 switched its iOS implementation to the
  # Dart native-assets `objective_c` package, whose framework fails to load at
  # app bootstrap ("Couldn't resolve native function 'DOBJC_initializeApi' …
  # Failed to load dynamic library 'objective_c.framework'") — issue #27. Pin to
  # the last Swift/CocoaPods implementation, which embeds via pod install.
  path_provider_foundation: 2.4.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#1A40F2"
  adaptive_icon_foreground: "assets/icon_foreground.png"

flutter:
  uses-material-design: true
