name: Play Store Deploy

on:
  workflow_dispatch:
    inputs:
      track:
        description: "Play track to upload to"
        required: true
        type: choice
        default: internal
        options:
          - internal
          - closed
          - production_draft
          - production_rollout_10

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TRACK: ${{ github.event.inputs.track }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Ruby + bundler cache
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: android

      - name: Write release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/dr-release.jks
          test -s android/app/dr-release.jks

      - name: Write key.properties
        env:
          KEY_PROPERTIES: ${{ secrets.KEY_PROPERTIES }}
        run: |
          printf '%s' "$KEY_PROPERTIES" > android/key.properties
          test -s android/key.properties

      - name: Write Play Console service account JSON
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          printf '%s' "$PLAY_SERVICE_ACCOUNT_JSON" > android/play-console-key.json
          test -s android/play-console-key.json

      - name: Flutter pub get
        run: flutter pub get

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Upload to Play
        working-directory: android
        run: bundle exec fastlane "$TRACK"

      - name: Clean up secrets
        if: always()
        run: |
          rm -f android/app/dr-release.jks
          rm -f android/key.properties
          rm -f android/play-console-key.json
