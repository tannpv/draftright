# Dev environment for `dev.draftright.info` + `api.dev.draftright.info`.
#
# Designed to run alongside the prod stack on the same VPS:
#   - separate backend container on :3100 (vs prod :3000)
#   - separate Postgres DB `draftright_dev` so test users / payments
#     never touch prod tables (single Postgres instance, different DB name)
#   - reuses the prod Redis instance via DB index 1 (separate keyspace)
#   - separate website container on :4100 (vs prod :4000)
#
# Usage on the VPS (alongside the existing prod stack):
#   git pull origin develop
#   cp .env .env.dev   # adjust ADMIN_PASSWORD / WEBSITE_URL etc — see below
#   docker compose --env-file .env.dev -f docker-compose.dev.yml up -d --build
#
# Bring down:
#   docker compose --env-file .env.dev -f docker-compose.dev.yml down
#
# Caddy block lives at deploy/Caddyfile.dev (operator copies into the
# active Caddyfile).
#
# Migrate / seed the dev DB once:
#   docker exec -it dr-backend-dev sh -c 'psql -h postgres -U draftright -c "CREATE DATABASE draftright_dev;"'
#   docker exec -it dr-backend-dev npx ts-node src/seed.ts
#
# Tear down DB data:
#   docker exec -it postgres-prod psql -U draftright -c 'DROP DATABASE IF EXISTS draftright_dev;'

services:
  backend-dev:
    build: ./backend
    container_name: dr-backend-dev
    ports:
      - "3100:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Load every variable from .env.dev into the container.  Avoids
    # the trap where compose `environment:` entries with hardcoded
    # values silently override anything in --env-file at YAML-parse
    # time (only `${VAR}` placeholders get substituted; literals
    # don't).  Pin the few overrides that the dev container needs no
    # matter what .env.dev says via the `environment:` block below.
    env_file:
      - .env.dev
    environment:
      - PORT=3000
      - WEBSITE_URL=https://dev.draftright.info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - default
    restart: unless-stopped

  # Go drop-in port of the backend (Phase 5 cutover). Same .env.dev as the
  # Node backend-dev — Go reads DATABASE_URL / JWT_SECRET / JWT_REFRESH_SECRET
  # / REDIS_URL from it directly. Listens on :3001 inside the container
  # (LISTEN_ADDR) and is published on host :3101. Caddy api.dev points here.
  backend-go-dev:
    build: ./backend-rewrite-go
    container_name: dr-backend-go-dev
    ports:
      - "3101:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env.dev
    environment:
      - LISTEN_ADDR=:3001
      - METRICS_ENABLED=true
      - WEBSITE_URL=https://dev.draftright.info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - default
    restart: unless-stopped

  website-dev:
    build:
      context: ./website
      args:
        # Astro reads PUBLIC_API_URL at build time; pointed at dev API
        # so the AccountPage / Pricing islands talk to the right backend.
        PUBLIC_API_URL: https://api.dev.draftright.info
    container_name: dr-website-dev
    ports:
      - "4100:80"
    restart: unless-stopped

  admin-dev:
    build:
      context: ./admin
      args:
        # Vite bakes VITE_API_URL into the bundle at build time;
        # rebuild needed to repoint at a different backend.
        VITE_API_URL: https://api.dev.draftright.info
    container_name: dr-admin-dev
    ports:
      - "5273:80"
    restart: unless-stopped

# Reuse the existing prod `postgres` + `redis` services + their volume.
# This compose file is intended to be brought up alongside the prod
# compose; load BOTH at every invocation:
#
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d backend-dev website-dev admin-dev
#
# Bringing it up with `-f docker-compose.dev.yml` ALONE fails with
# "service depends on undefined service redis" because the depends_on
# refs below resolve only when both files are in the project context.
