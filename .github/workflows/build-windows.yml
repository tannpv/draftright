name: Build Windows app

on:
  push:
    branches: [develop, main]
    paths:
      - 'DraftRightWindows/**'
      - '.github/workflows/build-windows.yml'
    # Tag pushes (`git push origin v2.2.x`) auto-ship: pairs with the
    # publish-to-update-server condition below so a tag push alone is enough
    # to land a release on the update server — no GitHub Release object
    # required. Every release tag points at a merge commit that bumped the
    # .csproj, so the path filter is always satisfied.
    tags: ['v*']
  workflow_dispatch:
    inputs:
      runtime:
        description: 'Target runtime'
        required: false
        default: 'both'
        type: choice
        options: [both, win-x64, win-arm64]
  release:
    types: [created]

# Release-triggered runs attach artifacts to the GitHub release; without
# this the default GITHUB_TOKEN can't update release assets and the
# softprops/action-gh-release step fails with "Resource not accessible
# by integration", which cascades to fail the whole build job and skip
# the publish-to-update-server step.
permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.runtime }}
    runs-on: windows-latest
    timeout-minutes: 25

    strategy:
      fail-fast: false
      matrix:
        runtime: [win-x64, win-arm64]

    env:
      RUNTIME: ${{ matrix.runtime }}
      COMMIT_SHA: ${{ github.sha }}

    defaults:
      run:
        working-directory: DraftRightWindows/DraftRightWindows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Show .NET info
        run: dotnet --info

      - name: Restore
        run: dotnet restore -r "$env:RUNTIME"

      - name: Publish self-contained single-file
        run: |
          dotnet publish `
            -c Release `
            -r "$env:RUNTIME" `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:EnableMsixTooling=true `
            -p:IncludeAllContentForSelfExtract=true `
            -o publish

      - name: Inspect output and rename for upload
        shell: pwsh
        run: |
          $exe = Get-Item publish\DraftRightWindows.exe
          "Built: $($exe.FullName)"
          "Size:  $([math]::Round($exe.Length/1MB, 1)) MB"
          $shortSha = $env:COMMIT_SHA.Substring(0, 7)
          $name = "DraftRight-Windows-${env:RUNTIME}-$shortSha.exe"
          Copy-Item publish\DraftRightWindows.exe "publish\$name"
          Add-Content -Path $env:GITHUB_ENV -Value "ARTIFACT_NAME=$name"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DraftRight-Windows-${{ matrix.runtime }}
          path: DraftRightWindows/DraftRightWindows/publish/${{ env.ARTIFACT_NAME }}
          retention-days: 30

      # ── Installer ─────────────────────────────────────────────────────
      # Wrap the published files into an Inno Setup .exe installer with a
      # Start menu entry, Add/Remove Programs registration, and uninstaller.
      # Inno Setup is preinstalled on windows-latest runners; the choco line
      # below is a safety net in case the image changes.

      - name: Ensure Inno Setup is available
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            Write-Host "Inno Setup not preinstalled, installing via choco..."
            choco install innosetup -y --no-progress
          }
          if (-not (Test-Path $iscc)) {
            throw "ISCC.exe still not found after install attempt"
          }
          Add-Content -Path $env:GITHUB_ENV -Value "ISCC=$iscc"

      - name: Build installer
        shell: pwsh
        working-directory: DraftRightWindows
        run: |
          # Read the version from the built .exe so the installer carries
          # the same version string as the binary. Strip any "+commit" suffix
          # (.NET adds the source-link InformationalVersion as ProductVersion,
          # e.g. "1.0.0+1f1a6605..."); Inno Setup's VersionInfoVersion only
          # accepts numeric MAJOR.MINOR.BUILD[.REVISION].
          $exe = Get-Item DraftRightWindows\publish\DraftRightWindows.exe
          $rawVersion = $exe.VersionInfo.ProductVersion
          $version = if ([string]::IsNullOrEmpty($rawVersion)) {
            "1.0.0"
          } else {
            ($rawVersion -split '\+')[0]
          }

          # Inno Setup wants the arch as just "x64" or "arm64" (not "win-x64").
          $arch = "$env:RUNTIME" -replace "^win-", ""

          $sourceDir = (Resolve-Path "DraftRightWindows\publish").Path

          Write-Host "Building installer: version=$version arch=$arch"
          Write-Host "  source: $sourceDir"

          & "$env:ISCC" `
            "/DAppVersion=$version" `
            "/DSourceDir=$sourceDir" `
            "/DArch=$arch" `
            installer\draftright.iss

          # Stamp the installer filename with the short SHA so artifacts
          # uploaded across runs are distinguishable.
          $shortSha = $env:COMMIT_SHA.Substring(0, 7)
          $built = Get-Item "installer\Output\DraftRight-Setup-$version-$arch.exe"
          $stamped = "DraftRight-Setup-$version-$arch-$shortSha.exe"
          Move-Item $built.FullName "installer\Output\$stamped"
          Add-Content -Path $env:GITHUB_ENV -Value "INSTALLER_NAME=$stamped"

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: DraftRight-Setup-${{ matrix.runtime }}
          path: DraftRightWindows/installer/Output/${{ env.INSTALLER_NAME }}
          retention-days: 30

      - name: Attach to release (if a release triggered this run)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            DraftRightWindows/DraftRightWindows/publish/${{ env.ARTIFACT_NAME }}
            DraftRightWindows/installer/Output/${{ env.INSTALLER_NAME }}

  # ── Auto-deploy installer to update server ────────────────────────────
  # Fires on either a GitHub Release being created OR a `v*` tag being
  # pushed — either path is treated as a deliberate release intent. Routine
  # branch pushes (develop/main) skip this job. Picks the x64 installer —
  # arm64 users can still grab the .exe from the GitHub Release page until
  # we ramp arm64 to the update server.
  #
  # Required repo secrets:
  #   DROPLET_SSH_KEY  — private key for deploy@droplet (dedicated
  #                      ~/.ssh/draftright_deploy keypair, NOT a personal key)
  #   DROPLET_HOST     — IP or hostname of the production droplet
  # No admin credentials needed — DB write is done over ssh+psql with the
  # same key that SCPs the installer.
  publish-to-update-server:
    name: Publish to update server
    needs: build
    if: github.event_name == 'release' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (for CHANGELOG release notes)
        uses: actions/checkout@v4

      - name: Download x64 installer artifact
        uses: actions/download-artifact@v4
        with:
          name: DraftRight-Setup-win-x64
          path: dist

      - name: Resolve version + remote filename
        id: meta
        env:
          GITHUB_REF_NAME_SAFE: ${{ github.ref_name }}
        run: |
          INSTALLER=$(ls dist/*.exe | head -n1)
          if [ -z "$INSTALLER" ]; then
            echo "::error::No installer .exe found in dist/"
            exit 1
          fi
          # github.ref_name on a release event is the tag name, e.g. "v2.2.5".
          # Strip leading "v" + reject anything that is not a strict semver
          # so a maliciously named tag cannot inject shell metacharacters.
          TAG="$GITHUB_REF_NAME_SAFE"
          VERSION="${TAG#v}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "::error::Refusing unsafe version string: $VERSION"
            exit 1
          fi
          REMOTE="DraftRight-Setup-Windows-${VERSION}-x64.exe"
          {
            echo "installer=$INSTALLER"
            echo "version=$VERSION"
            echo "remote=$REMOTE"
          } >> "$GITHUB_OUTPUT"
          ls -lh "$INSTALLER"

      - name: Extract release notes from CHANGELOG
        id: notes
        env:
          NEW_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          # Every release must carry a user-facing note (shown post-update as
          # "What's New"). A missing CHANGELOG section fails the release.
          if ! NOTES=$(bash scripts/changelog-extract.sh "$NEW_VERSION"); then
            echo "::error::No '## $NEW_VERSION' section in CHANGELOG.md — add release notes before tagging a release."
            exit 1
          fi
          {
            echo "notes<<DRNOTES_EOF"
            echo "$NOTES"
            echo "DRNOTES_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Release notes for $NEW_VERSION:"; echo "$NOTES"

      - name: SCP installer to droplet
        env:
          DROPLET_SSH_KEY: ${{ secrets.DROPLET_SSH_KEY }}
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          INSTALLER_PATH: ${{ steps.meta.outputs.installer }}
          REMOTE_NAME: ${{ steps.meta.outputs.remote }}
        run: |
          umask 077
          printf '%s\n' "$DROPLET_SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          scp -i /tmp/deploy_key \
              -o StrictHostKeyChecking=accept-new \
              -o UserKnownHostsFile=/tmp/known_hosts \
              "$INSTALLER_PATH" \
              "deploy@${DROPLET_HOST}:/tmp/${REMOTE_NAME}"
          ssh -i /tmp/deploy_key \
              -o StrictHostKeyChecking=accept-new \
              -o UserKnownHostsFile=/tmp/known_hosts \
              "deploy@${DROPLET_HOST}" \
              "sudo mv /tmp/\"${REMOTE_NAME}\" /var/www/draftright/downloads/\"${REMOTE_NAME}\""

      - name: Upsert app_releases.windows row via ssh+psql
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          NEW_VERSION: ${{ steps.meta.outputs.version }}
          REMOTE_NAME: ${{ steps.meta.outputs.remote }}
          RELEASE_NOTES: ${{ steps.notes.outputs.notes }}
        run: |
          # Match what scripts/release-publish.sh does locally: write to
          # app_releases via psql over the SSH tunnel rather than the HTTP
          # /admin/releases endpoint. The endpoint enforces role=admin, but
          # the deploy user on the droplet is already trusted (it owns the
          # backend container) so a direct DB upsert is the simpler path.
          # Avoids needing to mint a fresh admin JWT every release.
          # Notes are dollar-quoted ($drnote$) so multi-line CHANGELOG text
          # needs no escaping; RELEASE_NOTES is passed via env (not inlined as
          # an Actions expression) so its contents can't break the script.
          SQL=$(cat <<SQL_EOF
          INSERT INTO app_releases (platform, channel, version, download_url, release_notes, required, enabled)
          VALUES ('windows', 'direct', '$NEW_VERSION', 'https://draftright.info/downloads/$REMOTE_NAME', \$drnote\$
          $RELEASE_NOTES
          \$drnote\$, false, true)
          ON CONFLICT (platform, channel) DO UPDATE SET
            version = EXCLUDED.version,
            download_url = EXCLUDED.download_url,
            release_notes = EXCLUDED.release_notes,
            updated_at = now();
          SQL_EOF
          )
          ssh -i /tmp/deploy_key \
              -o StrictHostKeyChecking=accept-new \
              -o UserKnownHostsFile=/tmp/known_hosts \
              "deploy@${DROPLET_HOST}" \
              "sudo docker exec -i draftright-postgres-1 psql -U draftright -d draftright -v ON_ERROR_STOP=1" <<<"$SQL"

      - name: Verify /updates/latest reports new version
        env:
          EXPECTED: ${{ steps.meta.outputs.version }}
        run: |
          ACTUAL=$(curl -fsS "https://api.draftright.info/updates/latest?platform=windows" \
            | jq -r '.platforms.windows.version')
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::/updates/latest reports $ACTUAL, expected $EXPECTED"
            exit 1
          fi
          echo "✓ /updates/latest reports windows $ACTUAL"

      - name: Verify installer serves real bytes
        env:
          REMOTE_NAME: ${{ steps.meta.outputs.remote }}
        run: |
          URL="https://draftright.info/downloads/$REMOTE_NAME"
          # HEAD via HTTP/2 occasionally returns "stream not closed cleanly"
          # — retry up to 5 times with a 3-s backoff, and force HTTP/1.1 so a
          # bad HTTP/2 stream can't poison the whole check.
          for attempt in 1 2 3 4 5; do
            HEADERS=$(curl -sS --http1.1 -I -m 15 "$URL" 2>&1 || true)
            CT=$(printf '%s' "$HEADERS" | awk -F': ' '/^content-type:/ { print $2 }' | tr -d '\r')
            CL=$(printf '%s' "$HEADERS" | awk -F': ' '/^content-length:/ { print $2 }' | tr -d '\r')
            if [ -n "$CT" ] && [ -n "$CL" ]; then break; fi
            echo "Verify attempt $attempt empty — retrying"
            sleep 3
          done
          if [[ "$CT" == text/html* ]]; then
            echo "::error::$URL returned content-type=$CT (Caddy HTML fallback). Restore manually."
            exit 1
          fi
          if [ "${CL:-0}" -lt 1000000 ]; then
            echo "::error::$URL content-length=$CL is too small for an installer (after 5 retries)."
            exit 1
          fi
          echo "✓ installer serving — $CT, $CL bytes"

  # ── MSIX bundle for Microsoft Store submission ──────────────────────────
  # Single-project MSIX: WindowsPackageType=MSIX activates AppxPackage targets
  # which produce an .msixbundle for x64+arm64. Submitted to Microsoft Store,
  # which signs the bundle automatically before publishing — no developer
  # cert required. Independent of the unpackaged Inno-installer build above.
  msix:
    name: Build MSIX bundle for Microsoft Store
    runs-on: windows-latest
    timeout-minutes: 25

    env:
      COMMIT_SHA: ${{ github.sha }}

    defaults:
      run:
        working-directory: DraftRightWindows/DraftRightWindows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore
        run: msbuild /t:Restore /p:Configuration=Release /p:Platform=x64 /p:RuntimeIdentifier=win-x64

      - name: Build MSIX (x64, StoreUpload)
        shell: pwsh
        run: |
          # x64-only single-project MSIX. The multi-arch .msixbundle path
          # needs per-arch PackageArchitecture wiring (WinAppSdk recipe
          # target errors without it); a single-arch x64 .msix is accepted
          # by the Store and is enough to ship. arm64 can be added later as
          # a second package in the same submission.
          msbuild `
            /t:Rebuild `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:RuntimeIdentifier=win-x64 `
            /p:WindowsPackageType=MSIX `
            /p:EnableMsixTooling=true `
            /p:GenerateAppxPackageOnBuild=true `
            /p:UapAppxPackageBuildMode=StoreUpload `
            /p:AppxBundle=Never `
            /p:PackageArchitecture=x64 `
            /p:AppxPackageDir=AppPackages\

      - name: Locate built bundle
        shell: pwsh
        run: |
          $bundle = Get-ChildItem -Path AppPackages -Recurse -Include *.msixupload, *.msixbundle | Select-Object -First 1
          if (-not $bundle) {
            Write-Host "Listing AppPackages tree for diagnosis:"
            Get-ChildItem -Path AppPackages -Recurse | Select-Object FullName, Length
            throw "No .msixupload or .msixbundle found"
          }
          Write-Host "Built: $($bundle.FullName) ($([math]::Round($bundle.Length/1MB, 1)) MB)"
          $shortSha = $env:COMMIT_SHA.Substring(0, 7)
          $name = "DraftRight-Store-$shortSha$($bundle.Extension)"
          Copy-Item $bundle.FullName "AppPackages\$name"
          Add-Content -Path $env:GITHUB_ENV -Value "MSIX_NAME=$name"
          Add-Content -Path $env:GITHUB_ENV -Value "MSIX_PATH=DraftRightWindows/DraftRightWindows/AppPackages/$name"

      - name: Upload MSIX bundle
        uses: actions/upload-artifact@v4
        with:
          name: DraftRight-MSIX-Store
          path: ${{ env.MSIX_PATH }}
          retention-days: 30
