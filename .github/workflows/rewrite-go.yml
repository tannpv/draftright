name: Rewrite-Go CI

# CI for the Go /rewrite microservice. Path-scoped triggers keep
# unrelated PRs from burning minutes. Three jobs:
#   lint  — gofmt + go vet + sqlc-check (schema drift gate)
#   test  — go test -race -count=1 against pinned Go version
#   build — container image, pushed to ghcr.io on main + tag pushes
#
# Security note: every templated expression here uses GitHub-controlled
# context (github.actor / github.ref / github.repository_owner /
# github.event_name) — never user-controlled fields like commit
# messages or PR titles. No `run: echo "${{ ... }}"` of untrusted
# input. See:
# https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/

on:
  push:
    branches: [develop, main]
    paths:
      - 'backend-rewrite-go/**'
      - '.github/workflows/rewrite-go.yml'
    tags: ['rewrite-go-v*']
  pull_request:
    paths:
      - 'backend-rewrite-go/**'
      - '.github/workflows/rewrite-go.yml'
  workflow_dispatch:

# Cancel in-flight runs on rapid pushes; full runs still complete on
# main + tags so production-ish builds aren't truncated.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  GO_VERSION: '1.22'
  WORKDIR: backend-rewrite-go

jobs:
  lint:
    name: Lint + vet + schema check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.WORKDIR }}/go.sum

      - name: gofmt
        run: |
          diff=$(gofmt -s -l . | grep -v '/sqlc/' || true)
          if [ -n "$diff" ]; then
            echo "::error::gofmt issues:"
            echo "$diff"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: sqlc-check (schema drift gate)
        run: |
          if [ -x scripts/sqlc-check.sh ] && command -v sqlc >/dev/null 2>&1; then
            ./scripts/sqlc-check.sh
          else
            echo "sqlc-check skipped (sqlc binary unavailable)"
          fi

  test:
    name: Test (race)
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.WORKDIR }}/go.sum

      - name: go test -race -count=1
        run: go test ./... -race -count=1 -coverprofile=coverage.out

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rewrite-go-coverage
          path: ${{ env.WORKDIR }}/coverage.out
          retention-days: 14

  build:
    name: Build + push container
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/rewrite-go-v'))
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Container metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/draftright-rewrite-go
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short
            type=match,pattern=rewrite-go-(v.+),group=1

      - name: Build (+ optional push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.WORKDIR }}
          file: ${{ env.WORKDIR }}/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/rewrite-go-v')) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
